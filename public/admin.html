<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · La Tribu Pikeo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --negro:     #0E0905;
      --naranja:   #d8450b;
      --naranja-2: #ef783e;
      --ambar:     #db8c23;
      --crema:     #f4e6c9;
      --crema-dim: rgba(244,230,201,0.45);
      --verde:     #2b532e;
      --card:      #161008;
      --card2:     #1d1309;
      --borde:     rgba(244,230,201,0.08);
    }

    body {
      background: var(--negro);
      color: var(--crema);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--borde);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: var(--naranja);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .brand h1 { font-size: 15px; font-weight: 800; }
    .brand p  { font-size: 11px; color: var(--crema-dim); margin-top: 1px; }

    .header-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ambar);
      background: rgba(219,140,35,0.1);
      border: 1px solid rgba(219,140,35,0.22);
      border-radius: 100px;
      padding: 4px 12px;
    }

    /* ── MAIN ── */
    .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat {
      background: var(--card2);
      border: 1px solid var(--borde);
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, var(--naranja), var(--ambar));
    }

    .stat-n {
      font-size: 36px;
      font-weight: 900;
      color: var(--naranja);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-l {
      font-size: 11px;
      color: var(--crema-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--card2);
      border: 1px solid var(--borde);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .inp {
      flex: 1;
      min-width: 130px;
      background: rgba(244,230,201,0.05);
      border: 1px solid rgba(244,230,201,0.1);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--crema);
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .inp::placeholder { color: rgba(244,230,201,0.22); }
    .inp:focus { border-color: var(--naranja); }
    input[type="date"].inp { color-scheme: dark; max-width: 170px; }

    .btn {
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }

    .btn-gold   { background: var(--naranja); color: var(--crema); }
    .btn-gold:hover { background: #c23a08; }
    .btn-out    { background: rgba(219,140,35,0.12); border: 1px solid rgba(219,140,35,0.28); color: var(--ambar); }
    .btn-out:hover { background: rgba(219,140,35,0.22); }
    .btn-ghost  { background: transparent; border: 1px solid var(--borde); color: var(--crema-dim); }
    .btn-ghost:hover { color: var(--crema); }
    .btn-clear  { background: transparent; border: none; color: rgba(244,230,201,0.28); font-size: 13px; cursor: pointer; padding: 10px 6px; }
    .btn-clear:hover { color: var(--crema-dim); }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--card2);
      border: 1px solid var(--borde);
      border-radius: 14px;
      overflow: hidden;
    }

    .table-top {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--borde);
      flex-wrap: wrap;
      gap: 10px;
    }

    .table-title {
      font-size: 14px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .count {
      background: rgba(216,69,11,0.14);
      color: var(--naranja-2);
      border: 1px solid rgba(216,69,11,0.22);
      border-radius: 100px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .export-row { display: flex; gap: 8px; }

    .overflow { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    table { width: 100%; border-collapse: collapse; min-width: 760px; }

    thead th {
      padding: 11px 14px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(244,230,201,0.32);
      background: rgba(244,230,201,0.02);
      border-bottom: 1px solid var(--borde);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(244,230,201,0.04);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(244,230,201,0.02); }

    tbody td {
      padding: 13px 14px;
      font-size: 13px;
      color: rgba(244,230,201,0.82);
      white-space: nowrap;
    }

    /* Partido badge */
    .partido-cell {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .partido-nombres {
      font-size: 12px;
      color: var(--crema-dim);
    }

    .marcador {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(219,140,35,0.1);
      border: 1px solid rgba(219,140,35,0.22);
      border-radius: 7px;
      padding: 3px 9px;
      font-size: 14px;
      font-weight: 900;
      color: var(--ambar);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }

    /* Status */
    .st {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .st-p  { background: rgba(244,230,201,0.06); color: rgba(244,230,201,0.32); }
    .st-c  { background: rgba(43,83,46,0.22);   color: #7ec882; border: 1px solid rgba(43,83,46,0.38); }
    .st-ca { background: rgba(180,30,30,0.14);  color: #e07070; border: 1px solid rgba(180,30,30,0.3); }

    .btn-confirmar {
      background: rgba(43,83,46,0.14);
      border: 1px solid rgba(43,83,46,0.35);
      color: #7ec882;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      font-family: inherit;
      margin-left: 6px;
    }
    .btn-confirmar:hover { background: rgba(43,83,46,0.28); }

    /* Check-in btn */
    .btn-ci {
      background: rgba(43,83,46,0.18);
      border: 1px solid rgba(43,83,46,0.38);
      color: #7ec882;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn-ci:hover { background: rgba(43,83,46,0.32); }
    .btn-ci:active { transform: scale(0.96); }
    .btn-ci:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .ci-done { font-size: 12px; color: #7ec882; font-weight: 700; }

    /* Delete btn */
    .btn-del {
      background: rgba(180,30,30,0.12);
      border: 1px solid rgba(200,40,40,0.3);
      color: #e07070;
      border-radius: 8px;
      padding: 6px 9px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      line-height: 1;
    }
    .btn-del:hover { background: rgba(200,40,40,0.28); }
    .btn-del:active { transform: scale(0.96); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1d1309;
      border: 1px solid rgba(244,230,201,0.1);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 380px;
      width: 90%;
      text-align: center;
    }
    .modal-icon { font-size: 32px; margin-bottom: 12px; }
    .modal-title { font-size: 15px; font-weight: 800; margin-bottom: 8px; }
    .modal-body { font-size: 13px; color: rgba(244,230,201,0.55); margin-bottom: 22px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; }
    .btn-cancel { background: rgba(244,230,201,0.06); border: 1px solid rgba(244,230,201,0.12); color: rgba(244,230,201,0.6); border-radius: 10px; padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-cancel:hover { background: rgba(244,230,201,0.1); }
    .btn-confirm-del { background: #b91c1c; border: none; color: #fff; border-radius: 10px; padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-confirm-del:hover { background: #991b1b; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a2e1b;
      border: 1px solid rgba(43,83,46,0.6);
      color: #7ec882;
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 13px;
      font-weight: 700;
      z-index: 300;
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Duplicado */
    .dup-badge {
      display: inline-block;
      background: rgba(234,179,8,0.15);
      border: 1px solid rgba(234,179,8,0.4);
      color: #facc15;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      white-space: nowrap;
    }
    tr.dup-row { background: rgba(234,179,8,0.04) !important; }
    tr.dup-row td:first-child { border-left: 2px solid rgba(234,179,8,0.5); }

    .wa-link { color: var(--naranja-2); text-decoration: none; }
    .wa-link:hover { text-decoration: underline; }

    .si-yes { color: #7ec882; font-weight: 600; }
    .si-no  { color: rgba(244,230,201,0.22); }

    .id-cell { color: rgba(244,230,201,0.22) !important; font-size: 12px !important; }
    .date-cell { color: rgba(244,230,201,0.38) !important; font-size: 12px !important; }

    /* Empty / loading */
    .empty, .loading {
      text-align: center;
      padding: 56px 24px;
      color: rgba(244,230,201,0.25);
      font-size: 14px;
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }

    @media (max-width: 640px) {
      .main { padding: 14px; }
      .stat-n { font-size: 28px; }
      .header-tag { display: none; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Modal confirmación borrado -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title" id="modalTitle">¿Eliminar reserva?</div>
    <div class="modal-body" id="modalBody">Esta acción no se puede deshacer.</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-confirm-del" id="btnConfirmDel">Eliminar</button>
    </div>
  </div>
</div>

<div class="header">
  <div class="brand">
    <div class="brand-icon">⚽</div>
    <div>
      <h1>Panel Admin · Pikeo</h1>
      <p>La Tribu Pikeo · Mundial 2026</p>
    </div>
  </div>
  <span class="header-tag">Interno</span>
</div>

<div class="main">

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-n" id="sTotal">—</div>
      <div class="stat-l">Reservas</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="sCheckins">—</div>
      <div class="stat-l">Check-ins</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="sPersonas">—</div>
      <div class="stat-l">Personas</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input class="inp" type="text" id="bNombre"  placeholder="🔍 Buscar nombre..."    oninput="filtrar()" />
    <input class="inp" type="text" id="bWA"      placeholder="📱 Buscar WhatsApp..."  oninput="filtrar()" style="max-width:190px;" />
    <input class="inp" type="date" id="bFecha"   onchange="filtrar()" />
    <button class="btn-clear" onclick="limpiar()">✕ Limpiar</button>
    <div class="export-row">
      <button class="btn btn-ghost" onclick="exp('csv')">⬇ CSV</button>
      <button class="btn btn-out"   onclick="exp('excel')">⬇ Excel</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-top">
      <div class="table-title">
        Reservas
        <span class="count" id="countBadge">0</span>
      </div>
    </div>

    <div class="overflow">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Tipo</th>
            <th>Nombre</th>
            <th>WhatsApp</th>
            <th>Reserva · Hora</th>
            <th>Personas</th>
            <th>Partido · Pronóstico</th>
            <th>Estado</th>
            <th>Check-in</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="10"><div class="loading">Cargando...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  let todas = [];

  async function cargarStats() {
    try {
      const d = await (await fetch('/api/stats')).json();
      document.getElementById('sTotal').textContent    = d.total;
      document.getElementById('sCheckins').textContent = d.checkins;
      document.getElementById('sPersonas').textContent = d.personas;
    } catch {}
  }

  async function cargar() {
    try {
      const resp = await fetch('/api/reservas');
      if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
      todas = await resp.json();
      filtrar();
    } catch (err) {
      console.error('[Admin] Error en cargar():', err);
      document.getElementById('tbody').innerHTML =
        `<tr><td colspan="10"><div class="empty"><div class="empty-icon">⚠️</div>Error cargando datos.<br><small style="opacity:.5;font-size:11px">${err.message}</small></div></td></tr>`;
    }
  }

  function filtrar() {
    const nom   = document.getElementById('bNombre').value.toLowerCase().trim();
    const wa    = document.getElementById('bWA').value.trim();
    const fecha = document.getElementById('bFecha').value;

    const lista = todas.filter(r => {
      if (nom   && !r.nombre.toLowerCase().includes(nom)) return false;
      if (wa    && !r.whatsapp.includes(wa)) return false;
      if (fecha && r.fecha_reserva !== fecha) return false;
      return true;
    });

    renderizar(lista);
  }

  function renderizar(lista) {
    document.getElementById('countBadge').textContent = lista.length;
    const tbody = document.getElementById('tbody');

    if (!lista.length) {
      tbody.innerHTML = '<tr><td colspan="10"><div class="empty"><div class="empty-icon">📋</div>Sin resultados.</div></td></tr>';
      return;
    }

    // Detectar duplicados: mismo WhatsApp + misma fecha + mismo partido
    const dupKeys = new Set();
    const dupIds  = new Set();
    for (const r of lista) {
      const key = `${r.whatsapp}|${r.fecha_reserva}|${r.equipo_a}|${r.equipo_b}`;
      if (dupKeys.has(key)) dupIds.add(key);
      dupKeys.add(key);
    }
    const isDup = r => dupIds.has(`${r.whatsapp}|${r.fecha_reserva}|${r.equipo_a}|${r.equipo_b}`);

    tbody.innerHTML = lista.map(r => {
      const waNum = r.whatsapp.replace(/\D/g, '');

      // Fecha reserva formateada
      const fechaFmt = r.fecha_reserva
        ? new Date(r.fecha_reserva + 'T12:00:00').toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'2-digit' })
        : '—';

      const ciBtn = r.checkin
        ? `<span class="ci-done">✅ Presente</span>`
        : `<button class="btn-ci" onclick="checkin(${r.id},this)">Marcar asistencia</button>`;

      const tipoClass = r.tipo === 'Reserva'
        ? 'background:rgba(216,69,11,0.12);color:#ef783e;border:1px solid rgba(216,69,11,0.25);'
        : 'background:rgba(43,83,46,0.15);color:#7ec882;border:1px solid rgba(43,83,46,0.3);';

      const dup = isDup(r);

      return `<tr${dup ? ' class="dup-row"' : ''}>
        <td class="id-cell">${r.id}</td>
        <td><span style="display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;${tipoClass}">${esc(r.tipo || '—')}</span></td>
        <td style="font-weight:700;">${esc(r.nombre)}${dup ? ' <span class="dup-badge">⚠ duplicado</span>' : ''}</td>
        <td><a class="wa-link" href="https://wa.me/${waNum}" target="_blank">${esc(r.whatsapp)}</a></td>
        <td>${fechaFmt}${r.hora_reserva ? ' · ' + r.hora_reserva : ''}</td>
        <td style="text-align:center;font-weight:800;">${r.cantidad_personas}</td>
        <td>
          <div class="partido-cell">
            <span class="partido-nombres">${esc(r.equipo_a)} vs ${esc(r.equipo_b)}</span>
            <span class="marcador">${r.gol_a} – ${r.gol_b}</span>
          </div>
        </td>
        <td>${estadoCell(r)}</td>
        <td>${ciBtn}</td>
        <td><button class="btn-del" onclick="confirmarEliminar(${r.id}, '${esc(r.nombre).replace(/'/g,"\\'")}')">🗑️</button></td>
      </tr>`;
    }).join('');
  }

  function limpiar() {
    document.getElementById('bNombre').value = '';
    document.getElementById('bWA').value     = '';
    document.getElementById('bFecha').value  = '';
    renderizar(todas);
  }

  async function checkin(id, btn) {
    btn.disabled = true;
    btn.textContent = '...';
    try {
      await fetch(`/api/reservas/${id}/checkin`, { method: 'PATCH' });
      const r = todas.find(x => x.id === id);
      if (r) { r.checkin = true; r.estado = 'confirmado'; }
      filtrar();
      cargarStats();
    } catch {
      btn.disabled = false;
      btn.textContent = 'Marcar asistencia';
    }
  }

  function estadoCell(r) {
    const labels = { pendiente: 'pendiente', confirmada: 'confirmada', cancelada: 'cancelada', confirmado: 'confirmado' };
    const clases = { pendiente: 'st-p', confirmada: 'st-c', cancelada: 'st-ca', confirmado: 'st-c' };
    const cl  = clases[r.estado]  || 'st-p';
    const lbl = labels[r.estado]  || r.estado;
    const btn = r.estado === 'pendiente'
      ? `<button class="btn-confirmar" onclick="confirmar(${r.id},this)">✓ Confirmar</button>`
      : '';
    return `<span class="st ${cl}">${lbl}</span>${btn}`;
  }

  async function confirmar(id, btn) {
    btn.disabled = true;
    btn.textContent = '...';
    try {
      const resp = await fetch(`/api/reservas/${id}/estado`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ estado: 'confirmada' })
      });
      if (!resp.ok) throw new Error();
      const r = todas.find(x => x.id === id);
      if (r) r.estado = 'confirmada';
      filtrar();
      mostrarToast('✅ Reserva confirmada');
    } catch {
      btn.disabled = false;
      btn.textContent = '✓ Confirmar';
    }
  }

  let _pendingDeleteId = null;

  function confirmarEliminar(id, nombre) {
    _pendingDeleteId = id;
    document.getElementById('modalTitle').textContent = `¿Eliminar la reserva de ${nombre}?`;
    document.getElementById('modalBody').textContent  = 'Esta acción no se puede deshacer.';
    document.getElementById('btnConfirmDel').onclick  = ejecutarEliminar;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function cerrarModal() {
    _pendingDeleteId = null;
    document.getElementById('modalOverlay').classList.remove('open');
  }

  async function ejecutarEliminar() {
    if (!_pendingDeleteId) return;
    const id = _pendingDeleteId;
    cerrarModal();
    try {
      const r = await fetch(`/api/reservas/${id}`, { method: 'DELETE' });
      if (!r.ok) throw new Error();
      todas = todas.filter(x => x.id !== id);
      filtrar();
      cargarStats();
      mostrarToast('✅ Reserva eliminada correctamente');
    } catch {
      mostrarToast('⚠️ Error al eliminar. Intenta de nuevo.');
    }
  }

  let _toastTimer = null;
  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Cerrar modal al hacer clic fuera
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });

  function exp(t) { window.open(`/api/export/${t}`, '_blank'); }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  cargarStats();
  cargar();
  setInterval(() => { cargar(); cargarStats(); }, 30000);
</script>
